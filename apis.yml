aid: quintiles-transnational-holdings
name: Quintiles Transnational Holdings
description: >-
  Quintiles Transnational Holdings was a Fortune 500 contract research organization
  (CRO) that provided biopharmaceutical development and commercial outsourcing services
  to the pharmaceutical, biotechnology, and medical device industries. In October 2016,
  Quintiles merged with IMS Health to form IQVIA, a leading provider of advanced analytics,
  technology solutions, and contract research services to the life sciences industry.
  The legacy Quintiles entity no longer operates as an independent company and does
  not maintain a public API program; all developer-facing capabilities are now part
  of IQVIA.
